version: '3.8'

services:
  # Clean Clode v2 (with markdown table preservation) - main domain
  cleanclode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleanclode-v2
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - n8n_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cleanclode.rule=Host(`cleanclode.anothershadeofgrey.com`)"
      - "traefik.http.routers.cleanclode.entrypoints=web,websecure"
      - "traefik.http.routers.cleanclode.tls.certresolver=letsencrypt"
      - "traefik.http.services.cleanclode.loadbalancer.server.port=80"
    environment:
      - VERSION=v2
      - TITLE=Clean Clode v2 (with Markdown Table Preservation)

networks:
  n8n_network:
    external: true
