services:
  # Clean Clode v2 (with markdown table preservation) - main domain
  cleanclode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleanclode-v2
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - n8n_network
    environment:
      - VERSION=v2
      - TITLE=Clean Clode v2 (with Markdown Table Preservation)

networks:
  n8n_network:
    external: true
